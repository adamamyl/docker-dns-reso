repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^(net_tester/\.venv|\.venv)/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy
        language: system
        args:
          - --ignore-missing-imports
          - --explicit-package-bases
          - docker-dns-updater.py
          - install.py
          - net_tester/
        pass_filenames: false
        always_run: true

      - id: bandit
        name: bandit
        entry: .venv/bin/bandit
        language: system
        types: [python]
        args: [-lll, -ii, -r]
        exclude: ^(net_tester/\.venv|\.venv)/

      - id: pip-audit
        name: pip-audit
        entry: .venv/bin/pip-audit
        language: system
        # CVE-2026-4539 (pygments): no fix released yet, re-enable when pygments >2.19.2 ships
        args: [--ignore-vuln, CVE-2026-4539]
        pass_filenames: false
        always_run: true
